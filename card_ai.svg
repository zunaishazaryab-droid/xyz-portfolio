<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGradient3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5" />
      <stop offset="100%" stop-color="#d1fae5" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" rx="16" fill="url(#bgGradient3)"/>
  <g transform="translate(200, 100)">
    <!-- Network Connections -->
    <line x1="0" y1="0" x2="-60" y2="-40" stroke="#10b981" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="60" y2="-40" stroke="#10b981" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="-80" y2="20" stroke="#10b981" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="80" y2="20" stroke="#10b981" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="-40" y2="60" stroke="#10b981" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="40" y2="60" stroke="#10b981" stroke-width="2" opacity="0.6"/>
    
    <line x1="-60" y1="-40" x2="-80" y2="20" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="60" y1="-40" x2="80" y2="20" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="-80" y1="20" x2="-40" y2="60" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="80" y1="20" x2="40" y2="60" stroke="#cbd5e1" stroke-width="1"/>
    
    <!-- Nodes -->
    <circle cx="-60" cy="-40" r="8" fill="#0f172a"/>
    <circle cx="60" cy="-40" r="8" fill="#0f172a"/>
    <circle cx="-80" cy="20" r="12" fill="#10b981"/>
    <circle cx="80" cy="20" r="12" fill="#10b981"/>
    <circle cx="-40" cy="60" r="8" fill="#0f172a"/>
    <circle cx="40" cy="60" r="8" fill="#0f172a"/>
    
    <!-- Center Node -->
    <circle cx="0" cy="0" r="20" fill="#10b981" filter="drop-shadow(0 0 10px rgba(16,185,129,0.5))"/>
    <circle cx="0" cy="0" r="8" fill="#ffffff"/>
  </g>
</svg>
