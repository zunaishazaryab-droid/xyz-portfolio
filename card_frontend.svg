<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5" />
      <stop offset="100%" stop-color="#d1fae5" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" rx="16" fill="url(#bgGradient2)"/>
  <g transform="translate(100, 30)">
    <!-- Browser Window -->
    <rect x="0" y="0" width="200" height="140" rx="8" fill="#ffffff" filter="drop-shadow(0 10px 15px rgba(0,0,0,0.05))"/>
    <!-- Top bar -->
    <rect x="0" y="0" width="200" height="20" rx="8" fill="#0f172a"/>
    <circle cx="15" cy="10" r="3" fill="#ef4444"/>
    <circle cx="25" cy="10" r="3" fill="#eab308"/>
    <circle cx="35" cy="10" r="3" fill="#10b981"/>
    
    <!-- Wireframe content -->
    <rect x="15" y="35" width="170" height="40" rx="4" fill="#f1f5f9"/>
    <rect x="15" y="85" width="80" height="40" rx="4" fill="#10b981" opacity="0.1"/>
    <rect x="105" y="85" width="80" height="40" rx="4" fill="#f1f5f9"/>
  </g>
  <!-- Floating Elements -->
  <rect x="60" y="100" width="50" height="50" rx="8" fill="#10b981" filter="drop-shadow(0 4px 6px rgba(16,185,129,0.3))" transform="rotate(-10 85 125)"/>
  <circle cx="330" cy="70" r="25" fill="#0f172a" filter="drop-shadow(0 4px 6px rgba(15,23,42,0.3))"/>
</svg>
